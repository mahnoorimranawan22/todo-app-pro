<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Todo App Pro</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="container">

    <!-- ================= Header ================= -->

    <header>

        <h1>

            <i class="fa-solid fa-list-check"></i>

            Todo App Pro

        </h1>

        <button id="themeBtn">

            <i class="fa-solid fa-moon"></i>

        </button>

    </header>

    <!-- ================= Search ================= -->

    <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
            type="text"
            id="searchInput"
            placeholder="Search Task...">

    </div>

    <!-- ================= Add Task ================= -->

    <div class="task-form">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter Task">

        <select id="category">

            <option>Study</option>

            <option>Work</option>

            <option>Personal</option>

        </select>

        <select id="priority">

            <option>High</option>

            <option>Medium</option>

            <option>Low</option>

        </select>

        <input
            type="date"
            id="dueDate">

        <button id="addBtn">

            <i class="fa-solid fa-plus"></i>

        </button>

    </div>

    <!-- ================= Statistics ================= -->

    <div class="stats">

        <div class="card">

            <h2 id="totalTasks">

                0

            </h2>

            <p>Total</p>

        </div>

        <div class="card">

            <h2 id="completedTasks">

                0

            </h2>

            <p>Completed</p>

        </div>

        <div class="card">

            <h2 id="remainingTasks">

                0

            </h2>

            <p>Remaining</p>

        </div>

    </div>

    <!-- ================= Progress ================= -->

    <div class="progress">

        <div
            class="progress-bar"
            id="progressBar">

        </div>

    </div>

    <!-- ================= Task List ================= -->

    <ul id="taskList">

    </ul>

</div>

<script src="script.js"></script>

</body>

</html>
